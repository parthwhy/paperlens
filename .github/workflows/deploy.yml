name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'new_ui/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: new_ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: new_ui/package-lock.json
      - run: npm ci
      - name: Build (base path auto-derived from repo slug)
        run: npm run build
        env:
          # Optional: point the demo at a deployed backend later.
          # VITE_API_BASE_URL: https://your-backend.onrender.com/api/v1
          GITHUB_REPOSITORY: ${{ github.repository }}
      - name: Add .nojekyll
        run: touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: new_ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
